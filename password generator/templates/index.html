<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSP Password Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <h1>MSP Password Generator</h1>
            </div>
            <p class="subtitle">Secure password generation for managed clients</p>
        </header>

        <main>
            <!-- Password Generator Section -->
            <section class="generator-card">
                <div class="card-header">
                    <h2>Generate Password</h2>
                </div>

                <div class="form-group">
                    <label for="company-select">Select Company</label>
                    <select id="company-select">
                        <option value="">-- Choose a company --</option>
                    </select>
                </div>

                <div id="scheme-info" class="scheme-info hidden">
                    <div class="scheme-grid">
                        <div class="scheme-item">
                            <span class="scheme-label">Length</span>
                            <span class="scheme-value" id="scheme-length">-</span>
                        </div>
                        <div class="scheme-item">
                            <span class="scheme-label">Uppercase</span>
                            <span class="scheme-value" id="scheme-upper">-</span>
                        </div>
                        <div class="scheme-item">
                            <span class="scheme-label">Lowercase</span>
                            <span class="scheme-value" id="scheme-lower">-</span>
                        </div>
                        <div class="scheme-item">
                            <span class="scheme-label">Digits</span>
                            <span class="scheme-value" id="scheme-digits">-</span>
                        </div>
                        <div class="scheme-item">
                            <span class="scheme-label">Symbols</span>
                            <span class="scheme-value" id="scheme-symbols">-</span>
                        </div>
                        <div class="scheme-item">
                            <span class="scheme-label">No Ambiguous</span>
                            <span class="scheme-value" id="scheme-ambiguous">-</span>
                        </div>
                    </div>
                    <div class="scheme-custom hidden" id="scheme-custom">
                        <span class="scheme-label">Format:</span>
                        <span class="scheme-value" id="scheme-format">-</span>
                    </div>
                </div>

                <button id="generate-btn" class="btn btn-primary" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Generate Password
                </button>

                <div id="password-result" class="password-result hidden">
                    <div class="password-display">
                        <input type="text" id="password-output" readonly>
                        <button id="copy-btn" class="btn btn-icon" title="Copy to clipboard">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                        <button id="regenerate-btn" class="btn btn-icon" title="Regenerate">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="password-meta">
                        <span id="strength-badge" class="strength-badge">-</span>
                        <span class="notice">Password is not saved anywhere</span>
                    </div>
                </div>
            </section>

            <!-- Company Management -->
            <section class="companies-card">
                <div class="card-header">
                    <h2>Company Schemes</h2>
                    <button id="add-company-toggle" class="btn btn-secondary btn-small">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Add Company
                    </button>
                </div>

                <div id="add-company-form" class="add-company-form hidden">
                    <h3>New Company Scheme</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="new-name">Company Name</label>
                            <input type="text" id="new-name" placeholder="e.g., Cyberdyne Systems">
                        </div>
                    </div>

                    <div class="form-row two-col">
                        <div class="form-group">
                            <label for="new-min">Min Length</label>
                            <input type="number" id="new-min" value="12" min="4" max="64">
                        </div>
                        <div class="form-group">
                            <label for="new-max">Max Length</label>
                            <input type="number" id="new-max" value="16" min="4" max="64">
                        </div>
                    </div>

                    <div class="form-row toggles">
                        <label class="toggle">
                            <input type="checkbox" id="new-upper" checked>
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Uppercase</span>
                        </label>
                        <label class="toggle">
                            <input type="checkbox" id="new-lower" checked>
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Lowercase</span>
                        </label>
                        <label class="toggle">
                            <input type="checkbox" id="new-digits" checked>
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Digits</span>
                        </label>
                        <label class="toggle">
                            <input type="checkbox" id="new-symbols" checked>
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Symbols</span>
                        </label>
                        <label class="toggle">
                            <input type="checkbox" id="new-ambiguous">
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">No Ambiguous</span>
                        </label>
                    </div>

                    <div class="form-row two-col">
                        <div class="form-group">
                            <label for="new-prefix">Custom Prefix (optional)</label>
                            <input type="text" id="new-prefix" placeholder="e.g., ACME-">
                        </div>
                        <div class="form-group">
                            <label for="new-suffix">Custom Suffix (optional)</label>
                            <input type="text" id="new-suffix" placeholder="e.g., -2024">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button id="save-company-btn" class="btn btn-primary btn-small">Save Company</button>
                        <button id="cancel-add-btn" class="btn btn-ghost btn-small">Cancel</button>
                    </div>
                </div>

                <div id="companies-list" class="companies-list">
                    <!-- Companies populated by JS -->
                </div>
            </section>
        </main>

        <footer>
            <p>Passwords are generated on-the-fly and are never stored.</p>
        </footer>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
